<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Güç-Sen</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .countdown-area {
            background-color: #06194d;
            color: white;
            padding: 18px 10px;
        }

        .countdown-title {
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: bold;
        }

        #countdown {
            font-size: 34px;
            font-weight: bold;
            color: #ffd000;
        }

        .labels {
            margin-top: 5px;
            font-size: 14px;
            word-spacing: 15px;
        }

        .main-image {
            display: block;
            width: 100%;
            height: auto;
        }

        @media (max-width: 600px) {
            .countdown-title {
                font-size: 17px;
            }

            #countdown {
                font-size: 25px;
            }

            .labels {
                font-size: 11px;
                word-spacing: 7px;
            }
        }
    </style>
</head>

<body>

    <div class="countdown-area">
        <div class="countdown-title">
            31 Temmuz saat 08.00'e kalan süre
        </div>

        <div id="countdown">
            Hesaplanıyor...
        </div>

        <div class="labels">
            GÜN SAAT DAKİKA SANİYE
        </div>
    </div>

    <img src="mesai.JPG" alt="Duyuru" class="main-image">

    <script>
        const hedefTarih = new Date("2026-07-31T08:00:00+03:00").getTime();

        function geriSayimiGuncelle() {
            const simdi = new Date().getTime();
            const kalanSure = hedefTarih - simdi;

            if (kalanSure <= 0) {
                document.getElementById("countdown").innerHTML =
                    "SÜRE DOLDU";
                clearInterval(sayac);
                return;
            }

            const gun = Math.floor(kalanSure / (1000 * 60 * 60 * 24));

            const saat = Math.floor(
                (kalanSure % (1000 * 60 * 60 * 24)) /
                (1000 * 60 * 60)
            );

            const dakika = Math.floor(
                (kalanSure % (1000 * 60 * 60)) /
                (1000 * 60)
            );

            const saniye = Math.floor(
                (kalanSure % (1000 * 60)) / 1000
            );

            document.getElementById("countdown").innerHTML =
                gun + " : " +
                String(saat).padStart(2, "0") + " : " +
                String(dakika).padStart(2, "0") + " : " +
                String(saniye).padStart(2, "0");
        }

        geriSayimiGuncelle();

        const sayac = setInterval(geriSayimiGuncelle, 1000);
    </script>

</body>
</html>
